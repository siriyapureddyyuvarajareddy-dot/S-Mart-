<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S Mart Portal - Staff Authentication</title>
  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
  <style>
    .glass-effect {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .custom-shadow {
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 8px -1px rgba(0, 0, 0, 0.03);
    }
  </style>
</head>
<body class="font-sans min-h-screen text-slate-800 antialiased flex flex-col bg-slate-950">

  <!-- Login Screen Overlay -->
  <div class="min-h-screen w-full flex items-center justify-center bg-slate-950 text-white relative overflow-hidden px-4 select-none">
    <!-- Abstract Glowing Gradients behind the card -->
    <div class="absolute w-[350px] h-[350px] md:w-[450px] md:h-[450px] rounded-full bg-blue-600/20 blur-[90px] md:blur-[120px] -top-20 -left-20 animate-pulse-slow"></div>
    <div class="absolute w-[350px] h-[350px] md:w-[450px] md:h-[450px] rounded-full bg-indigo-600/20 blur-[90px] md:blur-[120px] -bottom-20 -right-20 animate-pulse-slow" style="animation-delay: 1.5s;"></div>

    <!-- Login Glassmorphic Container -->
    <div class="w-full max-w-md bg-slate-900/65 border border-slate-800 rounded-3xl p-6 md:p-8 shadow-2xl backdrop-blur-xl relative z-10 transition-all duration-300">
      
      <!-- Title Header -->
      <div class="text-center mb-8">
        <div class="inline-flex p-3 bg-blue-600/10 border border-blue-500/20 text-blue-400 rounded-2xl mb-4 shadow-inner">
          <!-- White Shopping Bag Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
          </svg>
        </div>
        <h2 class="text-2xl md:text-3xl font-extrabold tracking-tight text-white">S Mart Portal</h2>
        <p class="text-slate-400 text-xs md:text-sm mt-1">Staff Inventory Control Hub</p>
      </div>

      <!-- Error Alert Banner -->
      {% if error %}
      <div class="mb-6 bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-xl p-3.5 text-xs font-semibold flex items-center gap-2 animate-bounce">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 flex-shrink-0 text-rose-500">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
        </svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <!-- Form -->
      <form action="/login" method="POST" class="space-y-5">
        <!-- Username Input -->
        <div>
          <label for="username" class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Username</label>
          <div class="relative">
            <input 
              type="text" 
              name="username" 
              id="username"
              placeholder="Enter username" 
              required
              class="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-950 border border-slate-800 text-sm placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 text-white font-medium transition-all"
            >
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-600">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Password Input -->
        <div>
          <label for="password" class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Password</label>
          <div class="relative">
            <input 
              type="password" 
              name="password" 
              id="password"
              placeholder="Enter password" 
              required
              class="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-950 border border-slate-800 text-sm placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 text-white font-medium transition-all"
            >
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-600">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="w-full mt-2 py-3.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-sm shadow-md hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 group cursor-pointer"
        >
          <span>Authenticate</span>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 transition-transform group-hover:translate-x-0.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
          </svg>
        </button>
      </form>
    </div>
  </div>

</body>
</html>
